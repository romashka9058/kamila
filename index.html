<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GDE DURA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { 
        font-family: impact; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        background: white; 
    }
    
    .scaling-wrapper {
        width: min(80vmin, 50rem); 
        display: flex;
        justify-content: center;
        align-items: center;}
    .q {
        text-align: center;
        flex-direction: column;
        display: flex;

    }


    img {

    .photo-container {
        width: min(70vmin, 40rem);
        margin: -4vmin auto -2.5vmin;
        height: min(75vmin, 45rem);
    }
    

    h1 { 
        font-size: min(20vmin, 11rem); 
        letter-spacing: -0.05em;
        font-weight: 900;}
    h2 { 
        font-size: min(8vmin, 4.5rem); 
        margin-bottom: 1vmin;
        font-weight: 500;
    }

    
    .info { 
        display: flex; 
        gap: 3vmin;
        justify-content: center;
    }
    
    .info p, .ls p {
        font-size: min(4vmin, 1.75rem);
        font-family: arial;
        line-height: 0.9;
        letter-spacing: min(.2vmin);
    } .ls p { margin: 2vmin 0; }
    
    .warning {
        font-size: min(2.5vmin, 1.5rem);
        line-height: 0.85;
        letter-spacing: min(.15vmin);
    }
  </style>
</head>
<body>
  <div class="scaling-wrapper">

      </div>
      <div class="info">
        <p>Height: 160 s huem</p>
        <p>Weight: ya ne znayu</p>
      </div>
      <div class="info">
        <p>Byed hair</p>
        <p>Brown Eyes</p>
      </div>
      <div class="ls"><p>Last seen: Zubovo</p></div>
      <h2 class="warning">IF YOU HAVE ANY INFORMATION REGARDING THIS MISSING MOTHERTRUCKER, PLEASE CALL YOUR LOCAL POLICE DEPARTMENT</h2>
    </div>
  </div>
</body>
</html>
