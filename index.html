<!DOCTYPE html>
<html lang="ru" translate="no">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <meta name="color-scheme" content="light only">
    <meta name="supported-color-schemes" content="light">
    <meta name="theme-color" content="#ffffff">
    <title>GDE DURA</title>
        <style>
            ::selection { background-color: #0000; }
            ::-moz-selection { background-color: #0000; }
            ::-webkit-scrollbar {width: 0; height: 0;}
                        
            :root {
                --рут: 1;
                    --макс: max(var(--общее), var(--рут));
                        --общее: calc((var(--ширина) + var(--текст)) / 2);
                    --ширина: 1;
                    --текст: 1;
            }

            body {
                overflow-x: hidden;
                min-height: 100lvh;
                width: 100vw;
            } 
                    
            * {
                -ms-overflow-style: none;
                margin: 0;
                box-sizing: border-box;
                scroll-behavior: smooth;
                transition: all .1s;
                scrollbar-width: none;
                border: none;
                background: none;
                overscroll-behavior: none;
            }


                    
            body {
                background: white;
                display: flex;
                align-items: center;
                justify-content: center;
            }

       
            img {
                object-fit: scale-down;
                width: 100vw;
                max-height: 80vh;
                position: absolute;
                bottom: 13vw;
            }
        </style>
    </head>


    <body>
        <img src="oa.png">
    </body>

</html>
